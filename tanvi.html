<!DOCTYPE html>
<html>
<head>
<style>
  .myDiv {
    height: 150px;
    width: 50%; /* Width is 50% of its container */
    background-color: powderblue;
    border: 1px solid black;
  }
</style>
</head>
<body>

<div class="myDiv">
  This div uses CSS classes to define its dimensions.
</div>

</body>
</html>
